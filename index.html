<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje stránka</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 36px;
            color: #333;
        }

        p {
            margin-top: 15px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Adéla Mervartová</h1>
        <p>Mám ráda psy.</p>
    </div>
</body>
</html>
